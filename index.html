<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur Étiquette Pharma</title>
    <script src="https://cdn.jsdelivr.net/npm/bwip-js@3.0.4/dist/bwip-js-min.js"></script>
    <style>
        /* --- STYLE POUR L'ÉCRAN --- */
        body { font-family: sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .no-print { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; width: 100%; max-width: 400px; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        
        button { 
            width: 100%; padding: 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; 
        }
        .btn-gen { background: #000; color: white; }
        .btn-print { background: #27ae60; color: white; margin-top: 5px; }

        /* --- L'ÉTQUETTE (Visible sur écran) --- */
        #label-to-print {
            width: 1.5in; height: 1in; /* Taille réelle */
            background: white; border: 1px solid #ddd;
            display: flex; padding: 0.1in; box-sizing: border-box;
            color: black;
        }
        .label-left { flex: 1; display: flex; flex-direction: column; justify-content: center; font-size: 8pt; font-weight: bold; }
        .label-center { flex: 2; display: flex; align-items: center; justify-content: center; font-size: 32pt; font-weight: bold; }
        .label-right { flex: 1.5; display: flex; align-items: center; justify-content: center; }
        canvas { width: 100%; height: auto; }

        /* --- CONFIGURATION STRICTE IMPRESSION --- */
        @media print {
            /* On cache TOUT ce qui a la classe "no-print" */
            .no-print, title, header, footer { display: none !important; }
            
            body { background: white; padding: 0; margin: 0; }
            
            /* On force l'étiquette à être seule en haut à gauche */
            #label-to-print {
                position: fixed;
                top: 0; left: 0;
                border: none !important;
                width: 1.5in !important;
                height: 1in !important;
                display: flex !important;
                visibility: visible !important;
            }
            
            /* Réglage de la page d'impression */
            @page {
                size: 1.5in 1in;
                margin: 0;
            }
        }
    </style>
</head>
<body>

    <div class="no-print">
        <div class="row">
            <input type="number" id="z" value="10" placeholder="Zone">
            <input type="number" id="a" value="8" placeholder="Allée">
        </div>
        <div class="row">
            <input type="text" id="etg" value="J" maxlength="1">
            <input type="number" id="niv" value="8">
            <input type="text" id="pl" value="B" maxlength="1">
        </div>
        <button class="btn-gen" onclick="update()">Mettre à jour</button>
        <button class="btn-print" onclick="window.print()">IMPRIMER L'ÉTIQUETTE</button>
    </div>

    <div id="label-to-print">
        <div class="label-left">
            <div>Z <span id="resZ">10</span></div>
            <div>A <span id="resA">8</span></div>
        </div>
        <div class="label-center" id="resM">J8B</div>
        <div class="label-right">
            <canvas id="canvas"></canvas>
        </div>
    </div>

    <script>
        function update() {
            const z = document.getElementById('z').value;
            const a = document.getElementById('a').value;
            const etg = document.getElementById('etg').value.toUpperCase();
            const niv = document.getElementById('niv').value;
            const pl = document.getElementById('pl').value.toUpperCase();

            const codeStr = etg + niv + pl;
            // Formule mathématique de ton travail
            var encoded = parseInt((z == '0' ? '2030' : '21' + ('0' + z).slice(-2)) + '00000000')
                     + (parseInt(a) * 1000000) + (etg.charCodeAt(0) - 64) * 10000 + (parseInt(niv) * 100) + (pl.charCodeAt(0) - 64);

            document.getElementById('resZ').innerText = z;
            document.getElementById('resA').innerText = a;
            document.getElementById('resM').innerText = codeStr;

            bwipjs.toCanvas('canvas', {
                bcid: 'datamatrix',
                text: encoded.toString(),
                scale: 4,
                datamatrixsize: '18x18'
            });
        }
        window.onload = update;
    </script>
</body>
</html>
